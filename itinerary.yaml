      - time: "10:00 - 11:00"
        title: "🦀 🍽 早午餐 ｜ 八食中心（自選現烤海鮮盛宴）🔥"
        image: "https://rimage.gnst.jp/livejapan.com/public/article/detail/a/30/00/a3000038/img/zh-tw/a3000038_parts_5d428e5a94769.jpg?20260401000000&q=80&rw=686&rh=490"
        map_loc: "Hachishoku Center"
        details:
          - "😋 <b>海鮮控天堂</b>：全家可在市場內自由挑選新鮮的巨型扇貝、生蠔、大蝦、黑鮪魚生魚片，買完直接帶去附設的「七厘村」租借炭火烤爐，現場現烤現吃，極致鮮美！"

      - time: "11:15 - 12:40"
        title: "⛩ 奇觀 ｜ 館鼻公園眺望 ＆ 蕪島神社（海貓之島）"
        image: "https://tournews.tw/wp-content/uploads/2020/02/%E4%B8%89%E9%99%B8%E6%B5%B7%E5%B2%B8%E8%95%AA%E5%B6%8B%E7%A5%9E%E7%A4%BEIMG_0738.jpg"
        map_loc: "Kabushima Shrine"
        details:
          - "先至館鼻公園飽覽美麗的八戶港灣。隨後前往驚人的「蕪島神社」，初夏正是黑尾鷗（海貓）繁殖盛期，滿山滿谷飛舞的震撼奇景非常壯觀。"

      - time: "13:00 - 15:30"
        title: "🌊 絕美海岸 ｜ 葦毛崎展望台 ＆ 種差海岸天然大草原"
        image: "https://visithachinohe.com/wp-content/uploads/2019/05/ashigezaki-tenbodai_n02.jpg"
        map_loc: "Tanesashi Coast"
        details:
          - "先到歐式古堡風格的葦毛崎展望台，飽覽太平洋的懸崖絕景。接著前往「種差海岸」，這裡巨大的天然綠色草皮一路延伸至海邊，在草地上吹著海風散步，非常療癒。"

      - time: "15:30 - 16:30"
        title: "☕ 休息 ｜ 特色海景咖啡廳享受下午茶"
        image: "https://lh3.googleusercontent.com/gps-cs-s/APNQkAGpxJqEdBnK6YpnMdwMo95v8mssQkt13yhn5NvpKY0LMmPb2AWyV1IUQAKksBFfSZaJBNLOyqxBO8XHlUWnFs9GvvVKKyqIsjuFTZd6LvPe5NZHuF1tm5icR59P-23R8l-33eie_YrhUIbe=s1360-w1360-h1020-rw"
        map_loc: "Tanesashi Coast Cafe"
        details:
          - "在海岸線挑選一家舒適的海景咖啡廳，全家喝杯咖啡、看海休息，隨後好整以暇準備駕車返回。"

      - time: "16:30 - 18:30"
        title: "🚗 驅車返程 ➔ 返回青森市區飯店"
        map_loc: "Daiwa Roynet Hotel Aomori, 1 Chome-11-16 Shinmachi, Aomori, 030-0801, Japan"
        details:
          - "由八戶循原路開回「青森大和ROYNET酒店」停放。今晚車子繼續留用，方便明早港區與伴手禮大採購移動。"

      - time: "18:30 - "
        title: "🍽 晚餐 ｜ 返回青森市區 ➔ 旅程最後一晚的自由盲選與補吃大會"
        map_loc: "Daiwa Roynet Hotel Aomori, 1 Chome-11-16 Shinmachi, Aomori, 030-0801, Japan"
        details:
          - "安全回到市區。今晚是留在青森的最後一個晚上，可以把這幾天覺得最好吃、或是還沒機會吃到的名店徹底攻略！"
        options:
          - name: "🍣 推薦 A：用青森站前壽司名店 或是 Taru 老鋪壽司來個華麗收尾"
            map_url: "https://maps.app.goo.gl/jUZzRvEz1dSiCtBp8?g_st=ipc"
            infos:
              - "😋 最後一晚用青森引以為傲的鮮魚、握壽司 and 精緻日式板前手藝，跟家人一起慶祝自駕之旅圓滿成功。"
          - name: "🥩 推薦 B：想再吃一次烤肉？大純 Daijun（看能否現場碰運氣）或 7點前免預約燒肉店"
            map_url: "https://maps.app.goo.gl/Dpr3A2pNWX5JJ9Rk6?g_st=ic"
            infos:
              - "😋 如果第一晚的肉質讓全家念念不忘，今晚可以早點去 7 點前免預約的烤肉店，或是去居酒屋街點地酒狂歡！"

  - day: "Day-6"
    date: "2026/06/14"
    weather: "舒適晴朗 ☀️"
    rain_prob: "20% 以下"
    weather_tip: "最後一天回台日，市區與港灣漫步極為舒適。還車前請抓好時間，記得在機場附近的加油站將油箱充滿！"
    title: "青森港區慢遊 ｜ 睡魔文化體驗、最後伴手禮大採購 ➔ 歸賦台灣"
    items:
      - time: "08:30 - 09:30"
        title: "🌅 晨間港區散步 ➔ 或開車前往【淺蟲溫泉】泡早湯"
        image: "https://aomori-tourism.com/lsc/upfile/spot/0000/0101/101_108_l.jpg"
        map_loc: "Asamushi Onsen"
        details:
          - "【備選方案一】全家慵懶漫步青森港灣，吹著晨風看海景，十分愜意。"
          - "【備選方案二】直接駕車前往半小時車程外的「淺蟲溫泉」享受面海的療癒早湯（如道之驛「夕之島」溫泉），一邊泡湯一邊遠眺陸奧灣絕景。"

      - time: "09:30 - 10:30"
        title: "👹 文化震撼 ｜ 睡魔之家 WARASSE"
        image: "https://s3-ap-northeast-1.amazonaws.com/thegate/2020/12/15/15/26/50/Nebuta-Museum.jpg"
        map_loc: "Nebuta Museum WA RASSE"
        details:
          - "近距離欣賞祭典中實際使用過、極具震撼力的巨大手工睡魔燈籠，感受青森傳統祭典的熱血靈魂。"

      - time: "10:30 - 11:30"
        title: "🍏 伴手禮天堂 ｜ A-FACTORY 設計感蘋果工坊"
        image: "https://aomori-tourism.com/lsc/upfile/spot/0000/3697/3697_107_l.jpg"
        map_loc: "A-FACTORY"
        details:
          - "就在睡魔之家隔壁！這裡販售玲瑯滿目的青森蘋果西打酒、蘋果派、各類精緻文創伴手禮，是回台前最後瘋狂掃貨的最佳據點。"

      - time: "11:30 - 12:00"
        title: "🔺 地標打卡 ｜ 青森縣觀光物產館 ASPAM"
        image: "https://www.bring-you.info/imgs/2023/08/aomori-aspam-7.jpg"
        map_loc: "Aomori Prefecture Tourist Center ASPAM"
        details:
          - "步行或開車至代表青森（Aomori）英文字母「A」的三角形特色地標建築，內有多元展售與港口景觀。"

      - time: "12:00 - 12:30"
        title: "🍽 午餐 ｜ 港區快速享用在地特產"
        map_loc: "A-FACTORY"
        details:
          - "在 A-FACTORY 的美食街或周邊快速享用輕食、牛肉咖哩或帆立貝拉麵，填飽肚子準備前往機場。"

      - time: "12:30 前"
        title: "🚗 歸還車輛 ➔ 抵達青森機場辦理登機 🔑"
        map_loc: "Kotani-1-14 Ōtani, Aomori, 030-0155, Japan"
        details:
          - "預計於 12:30 前開回機場附近的指定租車店（地址：Kotani-1-14 Ōtani）。"
          - "💡 <b>重要提醒</b>：還車前務必在附近加油站將油箱「加滿油」，保留發票供店員查驗。結清 ETC 後由租車公司接駁至機場航廈。"

      - time: "15:30"
        title: "✈️ 班機起飛 ➔ 返回溫暖的家"
        map_loc: "Aomori Airport"
        details:
          - "13:30 於青森機場完成託運與通關手續，逛逛免稅店。班機於 15:30 準時起飛，結束充實精采的青森六天五夜家族自駕之旅！"
