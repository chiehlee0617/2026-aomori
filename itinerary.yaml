  - day: "Day-2"
    date: "2026/06/10"
    weather: "多雲轉晴天 🌤"
    rain_prob: "27% ~ 38%"
    weather_tip: "核心健行日！山區體感僅 10-12°C 左右，長輩防寒外套需帶夠。步道水氣重、濕滑，請務必穿著防滑運動鞋。"
    title: "奧入瀨溪流新綠 ｜ 森林芬多精散步、十和田湖姬鱒料理、秘湯酸ヶ湯"
    items:
      - time: "07:30 - 10:00"
        title: "🚗 早安青森 ｜ 自駕前往奧入瀨溪流"
        map_loc: "Oirase Stream"
        details:
          - "全家在「青森大和ROYNET酒店」享用完早餐後於 07:30 準時準點出發，向南駛入山區。"

      - time: "10:00 - 13:00"
        title: "🌿 🌲 核心亮點 ｜ 奥入瀬渓流 森林新綠散策"
        image: "https://www.jre-travel.com/content/dam/jretravel/site/page/article/images/00220/a00220_00_p.jpg"
        map_loc: "Ishigado Rest Area"
        details:
          - "✨ 精華路線分段停靠：石ヶ戶（傳奇女盜小屋）➔ 阿修羅之流 ➔ 雲井瀑布 ➔ 銚子大滝。"
          - "💡 貼心提醒：初夏新綠美不勝收，步道多有水氣，請全家穿著防滑好走路的球鞋。"

      - time: "13:15 - 15:00"
        title: "🐟 中午 ｜ 十和田湖畔散步 ＆ 享用野生姬鱒料理"
        image: "https://img.vocus.cc/y4OIEM8xwOiZhcPM_Wzz-gGyPVmiw6siZA5oclz4pKE/w:740/f:webp/plain/https://images.vocus.cc/93d4a061-336c-4d47-99e9-b23882750001.jpg"
        map_loc: "Lake Towada"
        details:
          - "開車抵達美麗的十和田湖畔，欣賞清澈見底的湖光山色。"
          - "🍽 午餐：在湖畔餐廳享用在地特產「姬鱒料理」（鹽烤或生魚片），餐後可散步至著名的「少女之像」合照。"

      - time: "15:45 - 16:30"
        title: "♨️ 秘湯 ➔ 酸ヶ湯温泉 煙霧裊裊的古老體驗"
        image: "https://www.jrtimes.tw/upload/control/c149bd2c-01a3-4c1e-8faa-3ba91a2540ef.jpg"
        map_loc: "Sukayu Onsen"
        details:
          - "回程經過著名的八甲田山區，停靠擁有 300 年歷史的「酸ヶ湯温泉」，全家泡湯歇息、體驗古老溫泉風情。"

      - time: "18:30 - "
        title: "🍽 晚餐 ｜ 返回青森市區（市區精選居酒屋、壽司或拉麵方案）"
        map_loc: "Daiwa Roynet Hotel Aomori, 1 Chome-11-16 Shinmachi, Aomori, 030-0801, Japan"
        details:
          - "約 18:30 左右安全返回「青森大和ROYNET酒店」放車。以下推薦今晚在市區放鬆的用餐編排："
        options:
          - name: "🍶 方案 A：助六 鄉土料理 —— 沉浸式睡魔祭氛圍與道地地酒（熱門需預約）"
            map_url: "https://maps.app.goo.gl/R2R6o5SVx8u4HidZ8?g_st=ic"
            infos:
              - "😋 <b>必點推薦</b>：干貝味噌燒（貝焼き味噌）、八戶仙貝汁，配青森地酒超搭！"
              - "📢 <b>攻略</b>：人潮眾多，強烈建議提早幾天請飯店幫忙去電預約。"
          - name: "🏮 方案 B：市區精選居酒屋 —— 隨性放鬆的地酒與小酌串燒夜"
            map_url: "https://maps.app.goo.gl/H55HZgsaTDgmFMAv5?g_st=ic"
            infos:
              - "😋 <b>必點推薦</b>：炭火地雞串燒、鹽烤當日海鮮、炸十和田牛蒡條。"
              - "📢 <b>攻略</b>：氣氛非常自由、熱鬧，適合全家輕鬆聊天、喝喝小酒。"
          - name: "🍜 備案 C：青森名物 —— 味噌咖哩牛奶拉麵"
            map_url: "https://maps.app.goo.gl/Dpr3A2pNWX5JJ9Rk6?g_st=ic"
            infos:
              - "😋 雖然是濃郁風味，但加了牛奶極為順口滑溜，是爬完山後快速補充熱量的溫暖首選！"

  - day: "Day-3"
    date: "2026/06/11"
    weather: "晴朗舒適 ☀️"
    rain_prob: "30% 以下"
    weather_tip: "全天最完美的一天！高山稻荷神社千本鳥居在陽光下極美，戶外活動時間長，請長輩注意防曬與補充水分。"
    title: "津輕藝術與秘境神社日 ｜ 千本鳥居、青森犬、巨大昭和大佛"
    items:
      - time: "08:30 - 10:30"
        title: "⛩️ 晨曦秘境 ｜ 高山稻荷神社"
        image: "https://hiyori.cc/wp/wp-content/uploads/IMG_3218.jpg"
        map_loc: "Takayama Inari Shrine"
        details:
          - "08:30 準時從「青森大和ROYNET酒店」出發前往青森西部。建議早點抵達以避開團客，早晨的陽光灑在蜿蜒的「千本鳥居」與日式庭園上，光影拍照最美。"

      - time: "10:30 - 12:30"
        title: "🚗 移動 ➔ 津輕/五所川原區域午餐"
        map_loc: "Goshogawara Station"
        details:
          - "參拜完後開始往青森市方向往回開，中午沿途在津輕市或五所川原市區尋找在地食堂享用溫馨午餐。"

      - time: "13:00 - 15:00"
        title: "🎨 文藝沉澱 ｜ 青森縣立美術館 ➔ 尋找巨大「青森犬」"
        image: "https://pgw.udn.com.tw/gw/photo.php?u=https://uc.udn.com.tw/photo/2024/03/02/0/29099458.jpg&x=0&y=0&sw=0&sh=0&exp=3600"
        map_loc: "Aomori Museum of Art"
        details:
          - "下午剛好在冷氣房室內沉澱一下心靈。館內建築極具現代設計感，必看亮點是藝術家奈良美智創作的巨大戶外雕塑「青森犬」。"

      - time: "15:30 - 17:00"
        title: "🙏 莊嚴和尚 ｜ 昭和大佛（青龍寺）"
        image: "https://lh3.googleusercontent.com/proxy/NyGnJ0cXSp8DgCPzopNsPifpDTmnRGd9i8J7QOecSJfPgoBi1C575cHDEztLrPwi9KJOygwy6wB6rcStnxsf-46Xy2u0v7b29PQCPuWpNenjn7sqYKK5dwqLHAk174c6cJdK"
        map_loc: "Seiryu-ji Temple (Showa Daibutsu)"
        details:
          - "從美術館開車過來非常近。這裡環境清幽避世，擁有日本最大的青銅坐佛（比奈良 and 鎌倉的都大），下午散步氣氛非常祥和。"

      - time: "17:30 - "
        title: "🐟 🍽 晚餐 ｜ 返回市區 ➔ 挑戰人氣爆棚的排隊海鮮定食或老鋪壽司"
        map_loc: "Daiwa Roynet Hotel Aomori, 1 Chome-11-16 Shinmachi, Aomori, 030-0801, Japan"
        details:
          - "傍晚回到「青森大和ROYNET酒店」停好車，今天回城時間較早，最適合去排那些「不能預約」的排隊名店！"
        options:
          - name: "🐟 方案 A：お食事処 おさない —— 超平價干貝海鮮爆棚名店（只能現場排）"
            map_url: "https://maps.app.goo.gl/rTKEhWf7ZfhWtqL47?g_st=ic"
            infos:
              - "😋 <b>必點推薦</b>：帆立貝刺身定食（大干貝超多汁鮮甜）、爆卵海膽丼、活扇貝現烤定食。"
              - "📢 <b>攻略</b>：<b>完全不可預約，只能現場排隊</b>。排隊人潮極長，建議提早去卡位，若排太久不想等，請立刻換到方案 B 或 C！"
          - name: "🍣 方案 B：Taru（樽壽司）—— 追求精緻與純日式高級老鋪體驗"
            map_url: "https://maps.app.goo.gl/ido8SC2VSDzy8Hxc8?g_st=ic"
            infos:
              - "😋 <b>必點推薦</b>：主廚配好（Omakase）的當日極上握壽司套餐、穴子魚壽司。"
              - "📢 <b>攻略</b>：價位偏貴，是高質感的板前壽司。店員多不通英文，點餐可能需要準備一下照片或用簡單日文、翻譯軟體溝通喔！"
          - name: "🥩 方案 C：市區人氣燒肉店 —— 7點以前進店免預約備案"
            map_url: "https://maps.app.goo.gl/Dpr3A2pNWX5JJ9Rk6?g_st=ic"
            infos:
              - "📢 <b>攻略</b>：主打<b>晚上 19:00 以前進店免預約</b>。如果方案 A 真的排到天荒地老，這家是不用拼時間的完美烤肉備案。"

  - day: "Day-4"
    date: "2026/06/12"
    weather: "晴轉多雲 ⛅"
    rain_prob: "晚間 60%"
    weather_tip: "白天弘前城與青池大致晴朗舒適，最高溫回升到 23°C。降雨預計在傍晚入夜後才提高，那時剛好在唐吉訶德室內大採購，影響不大。"
    title: "弘前浪漫城下町 ｜ 蘋果派巡禮、白神山地夢幻青池、唐吉訶德大採購"
    items:
      - time: "08:30 - 09:30"
        title: "🚗 早安 ｜ 自駕前往歷史文化之城 弘前"
        map_loc: "Hirosaki Castle"
        details:
          - "早晨準時從「青森大和ROYNET酒店」出發，前往大正浪漫風情的弘前市。"

      - time: "09:30 - 12:30"
        title: "🏯 散策 ｜ 弘前城公園 ＆ 浪漫蘋果派巡禮 🥧"
        image: "https://www.tohokukanko.jp/lsc/upfile/spot/0000/1296/1296_4_l.jpg"
        map_loc: "Hirosaki Park"
        details:
          - "初夏的弘前城綠樹成蔭、涼爽宜人。散步完後，一定要在城下的咖啡廳挑選幾塊剛出爐、酸甜酥脆的「弘前蘋果派」！"

      - time: "12:30 - 13:30"
        title: "🍽 中午 ｜ 弘前特色洋食咖啡廳午餐"
        image: "https://www.tohokukanko.jp/lsc/upfile/spot/0000/1630/1630_5_l.jpg"
        map_loc: "藤田記念庭園 洋館"
        details:
          - "午餐推薦：在藤田紀念庭園的洋館內，一邊欣賞優雅庭園，一邊享用精緻的「蘋果咖哩飯」或法式洋食。"

      - time: "15:00 - 16:30"
        title: "💎 奇景 ｜ 白神山地 🌟 夢幻 Tiffany 藍「青池」"
        image: "https://www.tohokukanko.jp/lsc/upfile/spot/0100/7187/1007187_1_l.jpg"
        map_loc: "Aoike"
        details:
          - "來到世界遺產外圍的十二湖，一睹不可思議的深邃湛藍「青池」，在初夏陽光折射下如同大自然掉落的寶石。"
          - "💡 <b>彈性調整備案</b>：若長輩覺得開車去青池車程較長（單程約2小時），可直接改為「弘前深度慢遊 ＋ 沿日本海海岸線輕鬆兜風」。"

      - time: "16:30 - 19:00"
        title: "🛒 購物 ➔ 唐吉訶德大掃貨 ➔ 返回住宿"
        image: "https://doqvf81n9htmm.cloudfront.net/data/jamiesu_149/2021JAN/0114/DQB_0.jpg"
        map_loc: "Don Quijote Aomori"
        details:
          - "開車返回青森市區途中，順路前往「唐吉訶德 青森店」進行藥妝與日本零食大補給，開車載戰利品最輕鬆！預計 19:00 返回「青森大和ROYNET酒店」。"

      - time: "19:00 - "
        title: "🐑 🍽 晚餐 ｜ 轟轟烈烈的烤肉大餐 ＆ 站前現流壽司（多重選擇）"
        map_loc: "Daiwa Roynet Hotel Aomori, 1 Chome-11-16 Shinmachi, Aomori, 030-0801, Japan"
        details:
          - "採購完後，今晚要把昨天沒吃到的美食、或是想重複大口吃肉的店一次補齊！"
        options:
          - name: "🐑 方案 A：在地蒙古烤肉 —— 鑊氣十足、大口吃肉補體力"
            map_url: "https://maps.app.goo.gl/ido8SC2VSDzy8Hxc8?g_st=ic"
            infos:
              - "😋 <b>必點推薦</b>：招牌烤鮮羊肉片、厚切羊排，搭配高麗菜與洋蔥。沒有腥味且醬汁極為下飯，開了一整天車吃這個最過癮！"
          - name: "🍣 方案 B：青森站前壽司名店 —— 長輩最愛極鮮現流握壽司"
            map_url: "https://maps.app.goo.gl/jUZzRvEz1dSiCtBp8?g_st=ipc"
            infos:
              - "😋 <b>必點推薦</b>：初夏黑鮪魚大腹壽司、當地陸奧灣特產干貝握壽司、當季地魚刺身拼盤。"
              - "📢 <b>攻略</b>：緊鄰車站與飯店，出餐速度快且海鮮品質極高，是想吃清爽頂級海鮮的長輩最愛。"
          - name: "🍜 方案 C：繼續挑戰沒排到的排隊名店 おさない 或 味噌咖哩牛奶拉麵"
            map_url: "https://maps.app.goo.gl/rTKEhWf7ZfhWtqL47?g_st=ic"
            infos:
              - "📢 可以去碰碰運氣看 おさない (Osanai) 晚間排隊人潮，或是挑選市區拉麵屋，輕鬆解決晚餐。"

